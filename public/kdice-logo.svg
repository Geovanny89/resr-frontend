<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="480" viewBox="0 0 400 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="200" y1="0" x2="200" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF5E00"/>
      <stop offset="50%" stop-color="#E0007F"/>
      <stop offset="100%" stop-color="#4B0082"/>
    </linearGradient>
    
    <!-- Circle gradient for icon -->
    <linearGradient id="iconGradient" x1="200" y1="120" x2="200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF8A00"/>
      <stop offset="50%" stop-color="#E0007F"/>
      <stop offset="100%" stop-color="#6B00B3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="480" fill="url(#bgGradient)"/>

  <!-- White circle border -->
  <circle cx="200" cy="200" r="130" fill="white" stroke="white" stroke-width="12"/>

  <!-- Icon background gradient circle -->
  <circle cx="200" cy="200" r="118" fill="url(#iconGradient)"/>

  <!-- Calendar icon -->
  <!-- Calendar outer rectangle -->
  <rect x="145" y="145" width="110" height="95" rx="8" fill="white" stroke="#1A1A1A" stroke-width="6"/>
  
  <!-- Calendar top rings -->
  <rect x="155" y="135" width="14" height="18" rx="2" fill="white"/>
  <rect x="231" y="135" width="14" height="18" rx="2" fill="white"/>

  <!-- Calendar grid lines -->
  <line x1="155" y1="175" x2="245" y2="175" stroke="#1A1A1A" stroke-width="4"/>
  <line x1="155" y1="195" x2="245" y2="195" stroke="#1A1A1A" stroke-width="4"/>
  <line x1="155" y1="215" x2="245" y2="215" stroke="#1A1A1A" stroke-width="4"/>
  
  <!-- Vertical grid lines -->
  <line x1="175" y1="175" x2="175" y2="230" stroke="#1A1A1A" stroke-width="3"/>
  <line x1="195" y1="175" x2="195" y2="230" stroke="#1A1A1A" stroke-width="3"/>
  <line x1="215" y1="175" x2="215" y2="230" stroke="#1A1A1A" stroke-width="3"/>
  <line x1="235" y1="175" x2="235" y2="230" stroke="#1A1A1A" stroke-width="3"/>

  <!-- Checkmark on calendar -->
  <path d="M205 185 L212 195 L228 175" fill="none" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Hand tapping -->
  <!-- Hand palm and fingers -->
  <path d="M195 235 Q185 255 185 275 Q185 290 195 295 Q210 295 220 280" fill="white"/>
  
  <!-- Index finger pointing down and touching calendar -->
  <path d="M200 235 L200 265 L195 275 L205 275 L205 265" fill="white" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Other fingers -->
  <path d="M210 240 L215 255 L215 270" fill="none" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round"/>
  <path d="M220 242 L225 255 L225 267" fill="none" stroke="#1A1A1A" stroke-width="6" stroke-linecap="round"/>

  <!-- Text: K-DICE RESERVAS -->
  <!-- K-DICE -->
  <text x="200" y="390" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="white" stroke="#1A1A1A" stroke-width="4" paint-order="stroke fill">K-DICE</text>
  
  <!-- RESERVAS -->
  <text x="200" y="435" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="26" font-weight="700" fill="white" stroke="#1A1A1A" stroke-width="3" paint-order="stroke fill">RESERVAS</text>

</svg>
